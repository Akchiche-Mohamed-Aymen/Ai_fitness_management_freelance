<!DOCTYPE html>
<html>
<body>

<button onclick="send()">Send</button>

<script>
async function send() {
    try {
        console.log("Sending request...");
    const response = await fetch(
        "https://flattop-annotate-cycle.ngrok-free.dev/plan_workout",
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                goal: "أريد خسارة الوزن",
                current_level: "مبتدئ",
                duration_time: 45,
                weight: 75,
                age: 20
            })
        }
    );

    const data = await response.json();
    console.log(data);
    } catch (error) {
        console.error("Error:", error.message);
    }
}
</script>

</body>
</html>
